<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commute Planner</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>

    <div id="map"></div>

    <!-- ── Controls panel ── -->
    <div id="panel">
        <div id="panel-header">
            <span id="panel-title">COMMUTE PLANNER</span>
        </div>

        <div class="field">
            <label class="field-label">ORIGIN</label>
            <div id="location-display">Click map to set location</div>
            <input type="hidden" id="lat"/>
            <input type="hidden" id="lng"/>
        </div>

<div class="field">
    <label class="field-label">FILTER BY</label>
    <div class="toggle-row">
        <label class="toggle-option">
            <input type="radio" name="filter-type" value="time" checked/> Time
        </label>
        <label class="toggle-option">
            <input type="radio" name="filter-type" value="distance"/> Distance
        </label>
    </div>
</div>

<!-- time input -->
<div class="field" id="time-field">
    <label class="field-label">MAX TRAVEL TIME</label>
    <div class="time-row">
        <input id="max-minutes" type="number" value="60" min="5" max="120" step="5"/>
        <span class="unit">mins</span>
    </div>
</div>

<!-- departure time — only shown for time filter -->
<div class="field" id="depart-field">
    <label class="field-label">DEPARTURE TIME</label>
    <div class="time-row">
        <input id="depart-time" type="time" value="09:00"/>
    </div>
</div>

<!-- distance input -->
<div class="field" id="distance-field" style="display:none;">
    <label class="field-label">MAX DISTANCE</label>
    <div class="time-row">
        <input id="max-km" type="number" value="10" min="1" max="100" step="1"/>
        <span class="unit">km</span>
    </div>
</div>

<div class="field">
    <label class="field-label">TRANSPORT MODES</label>
    <div class="checkbox-group">
        <label class="checkbox-label">
            <input type="checkbox" id="mode-rail" value="rail" checked/>
            <span class="checkbox-custom rail"></span>Rail
        </label>
        <label class="checkbox-label">
            <input type="checkbox" id="mode-tube" value="tube" checked/>
            <span class="checkbox-custom tube"></span>Tube
        </label>
        <label class="checkbox-label">
            <input type="checkbox" id="mode-bus" value="bus"/>
            <span class="checkbox-custom bus"></span>Bus
        </label>
        <label class="checkbox-label">
            <input type="checkbox" id="mode-ferry" value="ferry"/>
            <span class="checkbox-custom ferry"></span>Ferry
        </label>
    </div>
</div>

        <button id="search-btn" disabled>SET ORIGIN FIRST</button>
        <button id="cancel-btn" disabled>✕</button>
        <p id="status"></p>
    </div>

    <!-- ── Map legend ── -->
    <div id="legend">
        <div class="legend-row"><span class="dot origin"></span>Your location</div>
        <div class="legend-row"><span class="dot rail"></span>Rail</div>
        <div class="legend-row"><span class="dot tube"></span>Tube</div>
        <div class="legend-row"><span class="dot bus"></span>Bus</div>
        <div class="legend-row"><span class="dot ferry"></span>Ferry</div>
        <div class="legend-row"><span class="legend-area"></span>Reachable area by driving</div>
        <div id="stop-count"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
